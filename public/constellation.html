<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Command Constellation — C.A.P.I.S.M.</title>
<style>
  :root{--glass:rgba(13,13,20,.82);--edge:rgba(120,120,160,.22);--ink:#d8d9e6;--muted:#7d7f93;--amber:#ffb454;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#050508;font-family:"Segoe UI",system-ui,sans-serif;color:var(--ink)}
  canvas{position:absolute;inset:0;width:100%;height:100%;cursor:grab;touch-action:none}
  canvas.dragging{cursor:grabbing}
  #menu-pill{position:absolute;top:16px;right:18px;z-index:20;padding:7px 16px;border:1px solid rgba(255,180,84,.55);border-radius:8px;background:var(--glass);color:var(--amber);font-size:11px;font-weight:700;letter-spacing:2px;cursor:pointer;backdrop-filter:blur(8px)}
  #menu-pill:hover{background:rgba(255,180,84,.12)}
  #panel{position:absolute;top:58px;right:18px;z-index:19;width:268px;padding:14px;border:1px solid var(--edge);border-radius:12px;background:var(--glass);backdrop-filter:blur(10px);box-shadow:0 8px 40px rgba(0,0,0,.6)}
  #panel.hidden{display:none}
  #panel input[type=text]{width:100%;padding:7px 10px;font-size:12px;border:1px solid var(--edge);border-radius:7px;background:rgba(0,0,0,.35);color:var(--ink);outline:none}
  #panel input[type=text]:focus{border-color:var(--amber)}
  .lab{margin:11px 0 5px;font-size:9.5px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
  .seg{display:flex;border:1px solid var(--edge);border-radius:7px;overflow:hidden}
  .seg button{flex:1;padding:6px 0;border:none;background:none;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer}
  .seg button.on{background:#e8e6f0;color:#0a0a10}
  .seg button:not(.on):hover{color:var(--ink)}
  .row{display:flex;align-items:center;gap:8px;margin-top:9px;font-size:11px;color:var(--muted)}
  .row input[type=range]{flex:1;accent-color:var(--amber);height:3px}
  .row .val{width:34px;text-align:right;color:var(--amber);font-family:Consolas,monospace;font-size:10.5px}
  .row label{display:flex;align-items:center;gap:6px;cursor:pointer}
  .btns{display:flex;gap:8px;margin-top:12px}
  .btns button{flex:1;padding:7px 0;font-size:11px;border:1px solid var(--edge);border-radius:7px;background:rgba(255,255,255,.03);color:var(--ink);cursor:pointer}
  .btns button:hover{background:rgba(255,255,255,.08)}
  #data-btn{width:100%;margin-top:9px;padding:7px 0;font-size:11px;border:1px solid rgba(255,180,84,.5);border-radius:7px;background:none;color:var(--amber);cursor:pointer;letter-spacing:1px}
  #data-btn:hover{background:rgba(255,180,84,.1)}
  #detail{position:absolute;left:18px;bottom:18px;z-index:18;width:320px;max-height:56vh;overflow-y:auto;padding:16px;border:1px solid var(--edge);border-radius:12px;background:var(--glass);backdrop-filter:blur(10px);box-shadow:0 8px 40px rgba(0,0,0,.6);display:none;scrollbar-width:thin}
  #detail .close{position:absolute;top:8px;right:11px;border:none;background:none;color:var(--muted);font-size:15px;cursor:pointer}
  #detail .kind{font-size:9px;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase;font-family:Consolas,monospace}
  #detail h3{margin:3px 0 8px;font-size:15px;color:#fff}
  #detail .chip{display:inline-block;margin:0 5px 8px 0;padding:2px 9px;font-size:10px;font-weight:700;border-radius:10px;color:#0a0a10}
  #detail table{width:100%;border-collapse:collapse;font-size:11.5px}
  #detail td{padding:2px 0;vertical-align:top;word-break:break-word}
  #detail td:first-child{color:var(--muted);width:80px;padding-right:8px}
  #detail a{color:#7cc7ff}
  #detail h4{margin:11px 0 4px;font-size:9.5px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
  #detail .conn{display:flex;gap:6px;align-items:baseline;padding:2.5px 0;font-size:11.5px;cursor:pointer}
  #detail .conn:hover .cl{text-decoration:underline}
  #detail .conn .rel{color:var(--muted);font-size:10px;margin-left:auto;white-space:nowrap}
  #detail .conn .dot{width:7px;height:7px;border-radius:50%;flex:none;align-self:center}
  #modal{position:absolute;inset:0;z-index:30;display:none;place-items:center;background:rgba(0,0,0,.55)}
  #modal .box{width:340px;padding:18px;border:1px solid var(--edge);border-radius:12px;background:#0d0d16}
  #modal h3{margin:0 0 12px;font-size:13px;letter-spacing:2px;color:var(--amber)}
  #modal .drow{display:flex;align-items:center;gap:9px;padding:4px 0;font-size:12px}
  #modal .drow .sw{width:11px;height:11px;border-radius:3px}
  #modal .drow .cnt{margin-left:auto;color:var(--muted);font-family:Consolas,monospace;font-size:11px}
  #modal .ok{margin-top:14px;width:100%;padding:8px 0;border:1px solid rgba(255,180,84,.5);border-radius:7px;background:none;color:var(--amber);cursor:pointer}
  #tip{position:absolute;z-index:25;display:none;pointer-events:none;padding:4px 10px;border:1px solid var(--edge);border-radius:6px;background:rgba(10,10,16,.95);font-size:11.5px;transform:translate(14px,-28px);white-space:nowrap}
  #tip .sub{color:var(--muted);font-size:9.5px}
</style>
</head>
<body>
<canvas id="stage"></canvas>
<button id="menu-pill">☰ MENU</button>
<div id="panel">
  <input id="q" type="text" placeholder="Search 3,000+ files… ( / )" autocomplete="off">
  <div class="lab">Layout</div>
  <div class="seg" id="seg-layout">
    <button data-v="force">Force</button><button data-v="circle">Circle</button>
    <button data-v="grid">Grid</button><button data-v="rings" class="on">Rings</button>
  </div>
  <div class="lab">View</div>
  <div class="seg" id="seg-view">
    <button data-v="dept" class="on">Departments</button><button data-v="folders">Folders</button>
  </div>
  <div class="lab">Ring spin (rings + orbits)</div>
  <div class="row"><input id="spin" type="range" min="0" max="3" step="0.1" value="0.6"></div>
  <div class="row"><label><input id="hide-names" type="checkbox"> Hide names</label></div>
  <div class="row">Link springs<input id="springs" type="range" min="0" max="1" step="0.01" value="0.38"><span class="val" id="springs-v">0.38</span></div>
  <div class="row">Circle / Max size<input id="maxsize" type="range" min="0.4" max="2.4" step="0.05" value="1.1"><span class="val" id="maxsize-v">1.10</span></div>
  <div class="btns"><button id="expand-all">Expand all</button><button id="collapse-all">Collapse all</button></div>
  <button id="data-btn">Data settings</button>
</div>
<div id="detail"><button class="close">×</button><div id="detail-body"></div></div>
<div id="modal"><div class="box"><h3>DATA SETTINGS</h3><div id="modal-rows"></div><button class="ok">Done</button></div></div>
<div id="tip"></div>

const toWorld=(sx,sy)=>[(sx-W/2)/view.s+view.x,(sy-H/2)/view.s+view.y];

// ---- grouping ------------------------------------------------------------------------
function groups(){ // ordered groups of memory items (dept view or folders view)
  if(viewBy==="dept"){
    return DEPTS.filter(d=>!hiddenDept.has(d)).map(d=>({key:d,label:d,color:DEPT_COLOR[d],items:memItems.filter(t=>t.dept===d)})).filter(g=>g.items.length);
  }
  return COMMS.filter(c=>!hiddenDept.has(c.dept)).map(c=>({key:"c"+c.cid,label:c.name,color:DEPT_COLOR[c.dept],items:memItems.filter(t=>t.cid===c.cid)})).filter(g=>g.items.length);
}
const visible=t=>t.kind!=="mem"||!hiddenDept.has(t.dept);
function nodeR(t){const base=t.kind==="mem"?1.6+Math.sqrt(t.d)*0.7:t.kind==="app"?9:t.kind==="routine"?6:3.2;return Math.min(t.kind==="mem"?6:14,base)*maxSize;}

// ---- RINGS layout ---------------------------------------------------------------------
const R_SKILL=[132,158,184],R_MEM0=250,R_TRAIL=16,R_ROUT=620,R_APP=700;
let ringSlots=null,ringSig="";
function buildRingSlots(){
  const sig=viewBy+"|"+[...hiddenDept].join();
  if(sig===ringSig&&ringSlots)return ringSlots;
  const gs=groups();
  ringSig=sig;
  const totalW=gs.reduce((s,g)=>s+Math.sqrt(g.items.length),0);
  const GAP=0.07,avail=2*Math.PI-GAP*gs.length;
  let ang=-Math.PI/2+0.2;
  const slots=new Map();const sectors=[];
  for(const g of gs){
    const secW=avail*Math.sqrt(g.items.length)/totalW;
    // sort items: by community then degree desc for coherent arcs
    const arr=[...g.items].sort((a,b)=>(a.cid-b.cid)||(b.d-a.d));
    let idx=0,trail=0;
    while(idx<arr.length){
      const r=R_MEM0+trail*R_TRAIL;
      const cap=Math.max(4,Math.floor(secW*r/13));
      for(let s2=0;s2<cap&&idx<arr.length;s2++,idx++){
        slots.set(arr[idx],{r,a0:ang+ (s2+0.5)/cap*secW});
      }
      trail++;
    }
    sectors.push({label:g.label.toUpperCase(),color:g.color,mid:ang+secW/2,r:R_MEM0-22,trails:trail});
    ang+=secW+GAP;
  }
  ringSlots={slots,sectors,maxTrail:Math.max(...sectors.map(s=>s.trails),1)};
  return ringSlots;
}
function ringsTarget(t){
  if(t.kind==="mem"){const rs=buildRingSlots();const s=rs.slots.get(t);if(!s)return[0,0];const a=s.a0+rot*0.5*(1+((s.r-R_MEM0)/R_TRAIL)%3*0.08);return[Math.cos(a)*s.r,Math.sin(a)*s.r];}
  if(t.kind==="skill"){const trail=t.k%3;const a=(t.k/SKILLS.length)*2*Math.PI-rot*0.9;return[Math.cos(a)*R_SKILL[trail],Math.sin(a)*R_SKILL[trail]];}
  if(t.kind==="routine"){const a=(t.k/ROUTINES.length)*2*Math.PI+rot*0.35-Math.PI/2;return[Math.cos(a)*R_ROUT,Math.sin(a)*R_ROUT];}
  const a=(t.k/APPS.length)*2*Math.PI+rot*0.22-Math.PI/2+0.1;return[Math.cos(a)*R_APP,Math.sin(a)*R_APP];
}

// ---- FORCE layout ---------------------------------------------------------------------
const DEPT_ANCHOR={Community:[-0.26,-0.36],Content:[-0.44,-0.02],Product:[-0.02,-0.18],Personal:[0.04,0.30],Business:[0.24,0.08],Skills:[-0.68,0.14],Routines:[0.48,0.14],Applications:[0.30,-0.32]};
function anchorOf(dept){const a=DEPT_ANCHOR[dept]||[0,0];return[a[0]*Math.min(W,H)*1.7,a[1]*Math.min(W,H)*1.7];}
function commAnchor(cid){const c=commByCid.get(cid);const[ax,ay]=anchorOf(c.dept);const idx=COMMS.filter(x=>x.dept===c.dept).findIndex(x=>x.cid===cid);const GA=Math.PI*(3-Math.sqrt(5));const rad=52*Math.sqrt(idx+0.6);return[ax+Math.cos(idx*GA)*rad,ay+Math.sin(idx*GA)*rad];}
function forceTick(dt){
  const gsK=0.045+springK*0.05;
  for(const t of items){
    if(!visible(t))continue;
    let ax,ay;
    if(t.kind==="mem"){
      if(!expanded.has(t.cid))continue; // hidden behind aggregate
      [ax,ay]=commAnchor(t.cid);
      const h1=hash(t.i*3+1)-0.5,h2=hash(t.i*7+2)-0.5;
      ax+=h1*Math.sqrt(commByCid.get(t.cid).count)*26;ay+=h2*Math.sqrt(commByCid.get(t.cid).count)*26;
    }else{
      [ax,ay]=anchorOf(t.dept);
      const GA=Math.PI*(3-Math.sqrt(5));const rad=(t.kind==="app"?15:11)*Math.sqrt(t.k+0.5);
      ax+=Math.cos(t.k*GA)*rad;ay+=Math.sin(t.k*GA)*rad;
    }
    t.vx=(t.vx+(ax-t.px)*gsK)*0.82;t.vy=(t.vy+(ay-t.py)*gsK)*0.82;
    t.px+=t.vx;t.py+=t.vy;
  }
  // aggregates drift to their community anchor (positions stored separately)
  for(const c of COMMS){if(expanded.has(c.cid))continue;const[ax,ay]=commAnchor(c.cid);c.agx=(c.agx??ax)+((ax-(c.agx??ax))*0.08);c.agy=(c.agy??ay)+((ay-(c.agy??ay))*0.08);}
  // aggregate badges shove each other apart so counts stay readable
  const collapsed=COMMS.filter(c=>!expanded.has(c.cid)&&!hiddenDept.has(c.dept));
  for(let a1=0;a1<collapsed.length;a1++)for(let b1=a1+1;b1<collapsed.length;b1++){
    const A=collapsed[a1],B=collapsed[b1];
    const ra=Math.max(9,Math.sqrt(A.count)*1.9)*maxSize,rb=Math.max(9,Math.sqrt(B.count)*1.9)*maxSize;
    const dx=B.agx-A.agx,dy=B.agy-A.agy,dist=Math.hypot(dx,dy)||0.01,min=ra+rb+10;
    if(dist<min){const push=(min-dist)/2,ux=dx/dist,uy=dy/dist;A.agx-=ux*push;A.agy-=uy*push;B.agx+=ux*push;B.agy+=uy*push;}
  }
}

// ---- CIRCLE layout ---------------------------------------------------------------------
function circleTargets(){
  const gs=groups();const all=[];gs.forEach(g=>all.push(...g.items));
  const rings=[560,588,616];const per=Math.ceil(all.length/rings.length);
  const map=new Map();const labels=[];
  let gi=0;
  all.forEach((t,i)=>{const ring=Math.floor(i/per),pos=i%per,cnt=Math.min(per,all.length-ring*per);const a=(pos/cnt)*2*Math.PI-Math.PI/2+rot*0.15;map.set(t,[Math.cos(a)*rings[ring],Math.sin(a)*rings[ring]]);});
  // group labels at each group's start
  let acc=0;for(const g of gs){const i=acc+g.items.length/2;const ring=1;const a=((i%per)/per)*2*Math.PI-Math.PI/2+rot*0.15;labels.push({label:g.label.toUpperCase(),color:g.color,a,r:668});acc+=g.items.length;}
  return{map,labels};
}
function circleTarget(t){
  if(t.kind==="skill"){const a=(t.k/SKILLS.length)*2*Math.PI+rot*0.3;return[Math.cos(a)*210,Math.sin(a)*210];}
  if(t.kind==="routine"){const a=(t.k/ROUTINES.length)*2*Math.PI+rot*0.12-Math.PI/2;return[Math.cos(a)*700,Math.sin(a)*700];}
  if(t.kind==="app"){const a=(t.k/APPS.length)*2*Math.PI+rot*0.1-Math.PI/2+0.12;return[Math.cos(a)*746,Math.sin(a)*746];}
  return circleCache.map.get(t)||[0,0];
}
let circleCache=null;

// ---- GRID layout ----------------------------------------------------------------------
function gridTargets(){
  const gs=groups();
  const cols=[...gs.map(g=>({label:g.label.toUpperCase(),color:g.color,items:g.items})),
    {label:"SKILLS",color:SKILL_COLOR,items:items.filter(t=>t.kind==="skill")},
    {label:"ROUTINES",color:ROUTINE_COLOR,items:items.filter(t=>t.kind==="routine")},
    {label:"APPLICATIONS",color:APP_COLOR,items:items.filter(t=>t.kind==="app")}];
  const map=new Map();const labels=[];
  const colW=170,perRow=8,sp=17;
  const total=cols.length,x0=-(total-1)*colW/2;
  cols.forEach((c,ci)=>{
    const cx=x0+ci*colW;labels.push({label:c.label,color:c.color,x:cx,y:-330});
    const arr=[...c.items].sort((a,b)=>b.d-a.d);
    arr.forEach((t,i)=>{const row=Math.floor(i/perRow),col=i%perRow;map.set(t,[cx-(perRow-1)*sp/2+col*sp,-278+row*sp]);});
  });
  return{map,labels};
}
let gridCache=null,gridSig="";

// ---- fit -----------------------------------------------------------------------------
function fit(){view.x=0;view.y=0;const R=mode==="rings"?R_APP+90:mode==="circle"?800:mode==="grid"?520:Math.min(W,H)*0.80;view.s=Math.min(W,H)/(2*R)*(mode==="grid"?1.35:0.96);}
fit();
// init positions at rings targets
for(const t of items){const[x,y]=ringsTarget(t);t.px=x;t.py=y;}

// ---- draw helpers -----------------------------------------------------------------------
function hexPath(x,y,r){ctx.beginPath();for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6;const px=x+Math.cos(a)*r,py=y+Math.sin(a)*r;i?ctx.lineTo(px,py):ctx.moveTo(px,py);}ctx.closePath();}
function starPath(x,y,r){ctx.beginPath();for(let i=0;i<8;i++){const rad=i%2?r*0.38:r;const a=-Math.PI/2+i*Math.PI/4;const px=x+Math.cos(a)*rad,py=y+Math.sin(a)*rad;i?ctx.lineTo(px,py):ctx.moveTo(px,py);}ctx.closePath();}
function dottedCircle(r,color,alpha,dotR,step){const sr=r*view.s;if(sr<8)return;const[cx0,cy0]=toScreen(0,0);const n=Math.max(24,Math.floor(2*Math.PI*sr/step));ctx.fillStyle=color;ctx.globalAlpha=alpha;for(let i=0;i<n;i++){const a=(i/n)*2*Math.PI+rot*0.1;ctx.beginPath();ctx.arc(cx0+Math.cos(a)*sr,cy0+Math.sin(a)*sr,dotR,0,7);ctx.fill();}ctx.globalAlpha=1;}
const matches=t=>!q||t.l.toLowerCase().includes(q);

// ---- main frame ------------------------------------------------------------------------
function frame(now){
  const dt=Math.min(0.05,(now-lastT)/1000||0.016);lastT=now;rot+=dt*0.12*spin;
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.fillStyle="#050508";ctx.fillRect(0,0,W,H);
  const hz=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.6);
  hz.addColorStop(0,"rgba(90,70,160,0.10)");hz.addColorStop(1,"rgba(90,70,160,0)");
  ctx.fillStyle=hz;ctx.fillRect(0,0,W,H);
  // ambient star dust
  ctx.fillStyle="#cfd4ff";
  for(const[dx,dy,dr,da]of DUST){const[x,y]=toScreen(dx,dy);if(x<0||x>W||y<0||y>H)continue;ctx.globalAlpha=da*(0.6+0.4*Math.sin(now/1400+dx));ctx.beginPath();ctx.arc(x,y,dr,0,7);ctx.fill();}
  ctx.globalAlpha=1;

  // layout targets + easing
  if(mode==="force")forceTick(dt);
  else{
    if(mode==="circle")circleCache=circleTargets();
    if(mode==="grid"){const gs2=viewBy+[...hiddenDept].join();if(gs2!==gridSig||!gridCache){gridCache=gridTargets();gridSig=gs2;}}
    for(const t of items){
      if(!visible(t))continue;
      const[tx,ty]=mode==="rings"?ringsTarget(t):mode==="circle"?circleTarget(t):(gridCache.map.get(t)||[0,0]);
      t.px+=(tx-t.px)*0.14;t.py+=(ty-t.py)*0.14;
    }
  }

  // decorative structure
  if(mode==="rings"){
    for(const r of R_SKILL)dottedCircle(r,SKILL_COLOR,0.28,0.9,9);
    dottedCircle(R_ROUT,ROUTINE_COLOR,0.3,1,11);
    dottedCircle(R_APP,APP_COLOR,0.25,1,12);
    // faint guide trails through the memory band (the empty grooves)
    {const mt=buildRingSlots().maxTrail;for(let tr=0;tr<mt;tr+=2)dottedCircle(R_MEM0+tr*R_TRAIL,"#8B7BFF",0.05,0.6,13);}
    // faint center link web
    ctx.strokeStyle="rgba(150,150,200,0.05)";ctx.lineWidth=0.7;ctx.beginPath();
    for(const[a,b]of webEdges){const ta=itemByNode.get(a),tb=itemByNode.get(b);if(!ta||!tb||!visible(ta)||!visible(tb))continue;const p=toScreen(ta.px,ta.py),p2=toScreen(tb.px,tb.py);ctx.moveTo(p[0],p[1]);ctx.lineTo(p2[0],p2[1]);}
    ctx.stroke();
    // ring band labels stacked at 12 o'clock
    const bands=[["SKILLS",R_SKILL[1],SKILL_COLOR],["MEMORY",R_MEM0+buildRingSlots().maxTrail*R_TRAIL*0.55,"#B9A0F5"],["ROUTINES",R_ROUT,ROUTINE_COLOR],["APPLICATIONS",R_APP,APP_COLOR]];
    ctx.textAlign="center";
    for(const[lbl,r,col]of bands){const[x,y]=toScreen(0,-r);if(y<-20||y>H+20)continue;ctx.font="600 13px 'Segoe UI'";ctx.fillStyle=col;ctx.globalAlpha=0.85;ctx.letterSpacing="4px";ctx.fillText(lbl,x,y-8);ctx.letterSpacing="0px";ctx.globalAlpha=1;}
    // department badges + labels at sector mids (labels dodge each other radially)
    {const placedL=[];
    for(const s of buildRingSlots().sectors){const a=s.mid;const[x,y]=toScreen(Math.cos(a)*s.r,Math.sin(a)*s.r);ctx.fillStyle=s.color;ctx.beginPath();ctx.arc(x,y,6.5*maxSize,0,7);ctx.fill();ctx.strokeStyle="rgba(255,255,255,.5)";ctx.lineWidth=1;ctx.stroke();
      if(!hideNames){const txt=s.label.slice(0,14);ctx.font="700 10px 'Segoe UI'";const tw=ctx.measureText(txt).width+6;
        let lx,ly,ok=false;
        for(const rr of[s.r-34,s.r-58,s.r+30]){const p=toScreen(Math.cos(a)*rr,Math.sin(a)*rr);lx=p[0];ly=p[1];const box={x:lx-tw/2,y:ly-8,w:tw,h:14};if(!placedL.some(b=>box.x<b.x+b.w&&box.x+box.w>b.x&&box.y<b.y+b.h&&box.y+box.h>b.y)){placedL.push(box);ok=true;break;}}
        if(ok){ctx.fillStyle="#e8e6f0";ctx.textAlign="center";ctx.letterSpacing="1.5px";ctx.strokeStyle="rgba(5,5,8,.85)";ctx.lineWidth=3;ctx.strokeText(txt,lx,ly+3);ctx.fillText(txt,lx,ly+3);ctx.letterSpacing="0px";}}}}
  }
  if(mode==="circle"&&circleCache){ctx.textAlign="center";for(const l of circleCache.labels){const[x,y]=toScreen(Math.cos(l.a)*l.r,Math.sin(l.a)*l.r);ctx.font="600 11px 'Segoe UI'";ctx.fillStyle=l.color;ctx.letterSpacing="2px";ctx.fillText(l.label.slice(0,18),x,y);ctx.letterSpacing="0px";}}
  if(mode==="grid"&&gridCache){ctx.textAlign="center";for(const l of gridCache.labels){const[x,y]=toScreen(l.x,l.y);ctx.font="600 11px 'Segoe UI'";ctx.fillStyle=l.color;ctx.letterSpacing="2px";ctx.fillText(l.label.slice(0,16),x,y);ctx.letterSpacing="0px";}}
  if(mode==="force"){
    // faint inter-node web among expanded
    ctx.strokeStyle=`rgba(150,150,200,${0.03+springK*0.03})`;ctx.lineWidth=0.6;ctx.beginPath();let drawn=0;
    for(const[a,b]of E){if(drawn>700)break;const ta=itemByNode.get(a),tb=itemByNode.get(b);if(!ta||!tb)continue;if(!visible(ta)||!visible(tb))continue;if(!expanded.has(ta.cid)||!expanded.has(tb.cid))continue;const p=toScreen(ta.px,ta.py),p2=toScreen(tb.px,tb.py);ctx.moveTo(p[0],p[1]);ctx.lineTo(p2[0],p2[1]);drawn++;}
    ctx.stroke();
    // cluster labels
    ctx.textAlign="center";
    const gl=viewBy==="dept"?DEPTS.filter(d=>!hiddenDept.has(d)).map(d=>({label:d.toUpperCase(),color:DEPT_COLOR[d],p:anchorOf(d)})):[];
    for(const g of[...gl,{label:"SKILLS",color:SKILL_COLOR,p:anchorOf("Skills")},{label:"ROUTINES",color:ROUTINE_COLOR,p:anchorOf("Routines")},{label:"APPLICATIONS",color:APP_COLOR,p:anchorOf("Applications")}]){const[x,y]=toScreen(g.p[0],g.p[1]);ctx.font="700 11px 'Segoe UI'";ctx.fillStyle=g.color;ctx.letterSpacing="2.5px";ctx.globalAlpha=0.9;ctx.fillText(g.label,x,y+4);ctx.globalAlpha=1;ctx.letterSpacing="0px";}
    // aggregates
    for(const c of COMMS){if(expanded.has(c.cid)||hiddenDept.has(c.dept))continue;const[x,y]=toScreen(c.agx??0,c.agy??0);const r=Math.max(9,Math.sqrt(c.count)*1.9)*maxSize;const col=DEPT_COLOR[c.dept];ctx.fillStyle="rgba(10,10,16,.9)";ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fill();ctx.strokeStyle=col;ctx.lineWidth=1.6;ctx.stroke();ctx.strokeStyle=col+"55";ctx.beginPath();ctx.arc(x,y,r+3.5,0,7);ctx.stroke();ctx.fillStyle=col;ctx.font=`700 ${Math.max(9,r*0.62)}px Consolas`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(String(c.count),x,y);ctx.textBaseline="alphabetic";}
  }

  // items
  const dim=q?0.06:1;
  for(const t of items){
    if(!visible(t))continue;
    if(mode==="force"&&t.kind==="mem"&&!expanded.has(t.cid))continue;
    const[x,y]=toScreen(t.px,t.py);
    if(x<-40||x>W+40||y<-40||y>H+40)continue;
    const r=Math.max(1.2,nodeR(t)*Math.min(1.6,view.s));
    const m=matches(t);
    ctx.globalAlpha=m?1:dim;
    const hl=t===hovered||t===selected;
    if(t.kind==="app"){hexPath(x,y,r+(hl?2:0));ctx.fillStyle="rgba(12,14,22,.92)";ctx.fill();ctx.strokeStyle=hl?"#fff":APP_COLOR;ctx.lineWidth=1.3;ctx.stroke();ctx.fillStyle="#e8ecf5";ctx.font=`700 ${Math.max(7,r*0.9)}px 'Segoe UI'`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(t.l[0],x,y+0.5);ctx.textBaseline="alphabetic";}
    else if(t.kind==="routine"){ctx.strokeStyle=hl?"#fff":ROUTINE_COLOR;ctx.lineWidth=1.4;ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.stroke();ctx.fillStyle=ROUTINE_COLOR;ctx.beginPath();ctx.arc(x,y,Math.max(1.5,r*0.4),0,7);ctx.fill();}
    else if(t.kind==="skill"&&mode==="force"){starPath(x,y,r+2.5);ctx.fillStyle=hl?"#fff":SKILL_COLOR;ctx.fill();}
    else{
      const hh=hash(t.kind==="mem"?t.i:t.k);
      const bright=(0.55+hh*0.45)*(0.82+0.18*Math.sin(now/1000*1.6+hh*6.28));
      ctx.fillStyle=t.color;ctx.globalAlpha=(m?1:dim)*bright;
      ctx.beginPath();ctx.arc(x,y,r+(hl?1.5:0),0,7);ctx.fill();
      if(t.kind==="mem"&&t.d>=18){ctx.globalAlpha=(m?1:dim)*0.25;ctx.beginPath();ctx.arc(x,y,r*2.4,0,7);ctx.fill();}
      if(hl){ctx.globalAlpha=1;ctx.strokeStyle="#fff";ctx.lineWidth=1.4;ctx.beginPath();ctx.arc(x,y,r+3,0,7);ctx.stroke();}
    }
    ctx.globalAlpha=1;
  }

  // labels (LOD: top-connected + matches + hovered/selected)
  if(!hideNames){
    ctx.textAlign="center";
    const budget=q?60:Math.floor(26*Math.max(1,view.s));
    const cand=[];
    for(const t of items){if(!visible(t))continue;if(mode==="force"&&t.kind==="mem"&&!expanded.has(t.cid))continue;if(q&&!matches(t))continue;if(!q&&t.kind==="mem"&&t.d<10&&view.s<1.6)continue;if(!q&&mode==="force"&&(t.kind==="app"||t.kind==="routine")&&view.s<1.2)continue;cand.push(t);}
    cand.sort((a,b)=>b.d-a.d);
    let shown=0;
    for(const t of cand){if(shown>=budget)break;const[x,y]=toScreen(t.px,t.py);if(x<0||x>W||y<0||y>H)continue;ctx.font="10.5px 'Segoe UI'";ctx.strokeStyle="rgba(5,5,8,.9)";ctx.lineWidth=3;ctx.strokeText(t.l.slice(0,24),x,y-nodeR(t)*view.s-5);ctx.fillStyle="#c9cbdd";ctx.fillText(t.l.slice(0,24),x,y-nodeR(t)*view.s-5);shown++;}
    for(const t of[hovered,selected]){if(!t)continue;const[x,y]=toScreen(t.px,t.py);ctx.font="600 11px 'Segoe UI'";ctx.strokeStyle="rgba(5,5,8,.95)";ctx.lineWidth=3.5;ctx.strokeText(t.l.slice(0,30),x,y-nodeR(t)*view.s-6);ctx.fillStyle="#fff";ctx.fillText(t.l.slice(0,30),x,y-nodeR(t)*view.s-6);}
  }

  // CLAUDE_MD core
  {
    const[x,y]=toScreen(0,0);
    if(mode!=="grid"){
      const pulse=0.5+0.5*Math.sin(now/1000*2);
      const g2=ctx.createRadialGradient(x,y,2,x,y,46+pulse*10);
      g2.addColorStop(0,"rgba(255,180,84,.5)");g2.addColorStop(1,"rgba(255,180,84,0)");
      ctx.fillStyle=g2;ctx.beginPath();ctx.arc(x,y,46+pulse*10,0,7);ctx.fill();
      const s3=15;ctx.fillStyle="#States";ctx.fillStyle="#2b1c08";ctx.strokeStyle="#ffb454";ctx.lineWidth=1.6;
      ctx.beginPath();ctx.roundRect(x-s3,y-s3,s3*2,s3*2,5);ctx.fill();ctx.stroke();
      ctx.fillStyle="#ffb454";ctx.font="700 10px Consolas";ctx.textAlign="center";ctx.fillText("MD",x,y+3.5);
      ctx.font="600 10.5px Consolas";ctx.fillStyle="#f5e9d0";ctx.fillText("CLAUDE_MD",x,y+s3+15);
      ctx.font="8px Consolas";ctx.fillStyle="#ffb454";ctx.letterSpacing="2px";ctx.fillText("C.A.P.I.S.M.",x,y+s3+27);ctx.letterSpacing="0px";
    }
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(t=>{lastT=t;frame(t);});

// ---- hit testing + interactions ------------------------------------------------------------
function hitTest(sx,sy){
  let best=null,bd=1e9;
  for(const t of items){
    if(!visible(t))continue;
    if(mode==="force"&&t.kind==="mem"&&!expanded.has(t.cid))continue;
    const[x,y]=toScreen(t.px,t.py);
    const r=Math.max(7,nodeR(t)*view.s+3);
    const d2=(x-sx)**2+(y-sy)**2;
    if(d2<r*r&&d2<bd){best=t;bd=d2;}
  }
  if(mode==="force"){for(const c of COMMS){if(expanded.has(c.cid)||hiddenDept.has(c.dept))continue;const[x,y]=toScreen(c.agx??0,c.agy??0);const r=Math.max(10,Math.sqrt(c.count)*1.9)*maxSize*view.s/Math.max(view.s,1)+6;const d2=(x-sx)**2+(y-sy)**2;if(d2<r*r&&d2<bd){best={kind:"agg",c};bd=d2;}}}
  return best;
}
let dragging=false,moved=false,lastP=null;
canvas.addEventListener("pointerdown",e=>{dragging=true;moved=false;lastP=[e.clientX,e.clientY];canvas.classList.add("dragging");canvas.setPointerCapture(e.pointerId);});
canvas.addEventListener("pointermove",e=>{
  if(dragging){const dx=e.clientX-lastP[0],dy=e.clientY-lastP[1];if(Math.abs(dx)+Math.abs(dy)>2)moved=true;view.x-=dx/view.s;view.y-=dy/view.s;lastP=[e.clientX,e.clientY];return;}
  const hit=hitTest(e.clientX,e.clientY);const tip=document.getElementById("tip");
  hovered=hit&&hit.kind!=="agg"?hit:null;
  if(hit){tip.style.display="block";tip.style.left=e.clientX+"px";tip.style.top=e.clientY+"px";
    if(hit.kind==="agg")tip.innerHTML=`${esc(hit.c.name)}<div class="sub">${hit.c.count} nodes · click to expand</div>`;
    else tip.innerHTML=`${esc(hit.l)}<div class="sub">${hit.kind==="mem"?`${hit.d} connections · ${esc(commByCid.get(hit.cid).name)}`:hit.kind==="skill"?"installed skill":hit.kind==="routine"?`routine · ${esc(hit.sched)}`:"application"}</div>`;
    canvas.style.cursor="pointer";
  }else{tip.style.display="none";canvas.style.cursor="grab";}
});
canvas.addEventListener("pointerup",e=>{dragging=false;canvas.classList.remove("dragging");if(moved)return;const hit=hitTest(e.clientX,e.clientY);
  if(!hit){selected=null;document.getElementById("detail").style.display="none";return;}
  if(hit.kind==="agg"){expanded.add(hit.c.cid);return;}
  select(hit);
});
canvas.addEventListener("wheel",e=>{e.preventDefault();const f=Math.exp(-e.deltaY*0.0015);const[wx,wy]=toWorld(e.clientX,e.clientY);view.s=Math.max(0.08,Math.min(10,view.s*f));view.x=wx-(e.clientX-W/2)/view.s;view.y=wy-(e.clientY-H/2)/view.s;},{passive:false});
canvas.addEventListener("dblclick",e=>{const f=1.7;const[wx,wy]=toWorld(e.clientX,e.clientY);view.s=Math.min(10,view.s*f);view.x=wx-(e.clientX-W/2)/view.s;view.y=wy-(e.clientY-H/2)/view.s;});

// ---- detail panel ------------------------------------------------------------------------
const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function select(t){
  selected=t;
  const el=document.getElementById("detail"),body=document.getElementById("detail-body");
  let html="";
  if(t.kind==="mem"){
    const n=N[t.i],c=commByCid.get(t.cid);
    html+=`<div class="kind">memory · ${esc(t.dept)}</div><h3>${esc(t.l)}</h3>`;
    html+=`<span class="chip" style="background:${t.color}">${esc(c.name)}</span>`;
    const rows=[["connections",t.d],...Object.entries(n.m).filter(([k])=>k!=="url").map(([k,v])=>[k.replace(/_/g," "),v])];
    html+="<table>"+rows.map(([k,v])=>`<tr><td>${esc(k)}</td><td>${esc(v)}</td></tr>`).join("")+"</table>";
    if(n.m.url)html+=`<div style="margin-top:6px;font-size:11.5px"><a href="${esc(n.m.url)}" target="_blank" rel="noopener">${esc(n.m.url)}</a></div>`;
    const conns=adj[t.i].slice(0,20);
    if(conns.length){html+=`<h4>Connections (${adj[t.i].length})</h4>`;
      html+=conns.map(({n:j,rel})=>{const tj=itemByNode.get(j);const col=tj?tj.color:"#888";return`<div class="conn" data-n="${j}"><span class="dot" style="background:${col}"></span><span class="cl">${esc(N[j].l)}</span><span class="rel">${esc(rel)}</span></div>`;}).join("");}
  }else if(t.kind==="skill"){html+=`<div class="kind">skill</div><h3>${esc(t.l)}</h3><span class="chip" style="background:${SKILL_COLOR}">installed</span><table><tr><td>location</td><td>~/.claude/skills/${esc(t.l)}</td></tr></table>`;}
  else if(t.kind==="routine"){html+=`<div class="kind">routine</div><h3>${esc(t.l)}</h3><span class="chip" style="background:${ROUTINE_COLOR}">${esc(t.sched)}</span>`;}
  else{html+=`<div class="kind">application</div><h3>${esc(t.l)}</h3><span class="chip" style="background:${APP_COLOR}">integration</span>`;}
  body.innerHTML=html;el.style.display="block";
  body.querySelectorAll(".conn").forEach(elc=>elc.addEventListener("click",()=>{const tj=itemByNode.get(+elc.dataset.n);if(tj){if(mode==="force")expanded.add(tj.cid);select(tj);flyTo(tj);}}));
}
document.querySelector("#detail .close").addEventListener("click",()=>{selected=null;document.getElementById("detail").style.display="none";});
function flyTo(t){const t0=performance.now(),dur=600,fx=view.x,fy=view.y,fs=view.s,ts=Math.max(view.s,1.4);const ease=x=>x<.5?2*x*x:1-Math.pow(-2*x+2,2)/2;(function step(now){const k=ease(Math.min(1,(now-t0)/dur));view.x=fx+(t.px-fx)*k;view.y=fy+(t.py-fy)*k;view.s=fs*Math.pow(ts/fs,k);if(k<1)requestAnimationFrame(step);})(t0);}

// ---- controls -------------------------------------------------------------------------------
document.getElementById("menu-pill").addEventListener("click",()=>document.getElementById("panel").classList.toggle("hidden"));
document.querySelectorAll("#seg-layout button").forEach(b=>b.addEventListener("click",()=>{document.querySelectorAll("#seg-layout button").forEach(x=>x.classList.toggle("on",x===b));mode=b.dataset.v;ringSig="";gridSig="";fit();}));
document.querySelectorAll("#seg-view button").forEach(b=>b.addEventListener("click",()=>{document.querySelectorAll("#seg-view button").forEach(x=>x.classList.toggle("on",x===b));viewBy=b.dataset.v;ringSig="";gridSig="";}));
document.getElementById("spin").addEventListener("input",e=>spin=+e.target.value);
document.getElementById("hide-names").addEventListener("change",e=>hideNames=e.target.checked);
document.getElementById("springs").addEventListener("input",e=>{springK=+e.target.value;document.getElementById("springs-v").textContent=springK.toFixed(2);});
document.getElementById("maxsize").addEventListener("input",e=>{maxSize=+e.target.value;document.getElementById("maxsize-v").textContent=maxSize.toFixed(2);});
document.getElementById("expand-all").addEventListener("click",()=>COMMS.forEach(c=>expanded.add(c.cid)));
document.getElementById("collapse-all").addEventListener("click",()=>COMMS.forEach(c=>{if(c.count>=6)expanded.delete(c.cid);}));
const qEl=document.getElementById("q");
qEl.addEventListener("input",()=>q=qEl.value.trim().toLowerCase());
addEventListener("keydown",e=>{if(e.key==="/"&&document.activeElement?.tagName!=="INPUT"){e.preventDefault();qEl.focus();}if(e.key==="Escape"){qEl.blur();q="";qEl.value="";}});

// data settings modal
const modal=document.getElementById("modal");
document.getElementById("data-btn").addEventListener("click",()=>{
  const rows=document.getElementById("modal-rows");
  const counts={};for(const t of memItems)counts[t.dept]=(counts[t.dept]||0)+1;
  rows.innerHTML=DEPTS.map(d=>`<div class="drow"><input type="checkbox" data-d="${d}" ${hiddenDept.has(d)?"":"checked"} style="accent-color:${DEPT_COLOR[d]}"><span class="sw" style="background:${DEPT_COLOR[d]}"></span>${d}<span class="cnt">${counts[d]||0}</span></div>`).join("")+
    `<div class="drow"><span class="sw" style="background:${SKILL_COLOR}"></span>Skills<span class="cnt">${SKILLS.length}</span></div>
     <div class="drow"><span class="sw" style="background:${ROUTINE_COLOR}"></span>Routines<span class="cnt">${ROUTINES.length}</span></div>
     <div class="drow"><span class="sw" style="background:${APP_COLOR}"></span>Applications<span class="cnt">${APPS.length}</span></div>`;
  rows.querySelectorAll("input").forEach(cb=>cb.addEventListener("change",()=>{cb.checked?hiddenDept.delete(cb.dataset.d):hiddenDept.add(cb.dataset.d);ringSig="";gridSig="";}));
  modal.style.display="grid";
});
modal.querySelector(".ok").addEventListener("click",()=>modal.style.display="none");
</script>
